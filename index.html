<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">

    <!-- ─── SIDEBAR ─── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <span class="brand-icon">⬡</span>
          <span class="brand-name">Aura</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="themeToggle" title="Toggle theme">
            <svg class="icon sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="icon-btn" id="newChatBtn" title="New chat">
            <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>

      <div class="search-wrap">
        <svg class="search-icon icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search conversations…" />
      </div>

      <div class="section-label">Messages</div>
      <ul class="contact-list" id="contactList"></ul>

      <div class="sidebar-footer">
        <div class="my-avatar-wrap">
          <div class="avatar avatar-me" style="background:var(--accent)">
            <span>Y</span>
            <span class="status-dot online"></span>
          </div>
          <div class="my-info">
            <div class="my-name">You</div>
            <div class="my-status">Active now</div>
          </div>
        </div>
        <button class="icon-btn"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      </div>
    </aside>

    <!-- ─── MAIN CHAT ─── -->
    <main class="chat-main" id="chatMain">

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⬡</div>
        <h2>Welcome to Aura</h2>
        <p>Select a conversation to start messaging</p>
      </div>

      <!-- Chat window (hidden until contact selected) -->
      <div class="chat-window hidden" id="chatWindow">

        <!-- Top bar -->
        <div class="chat-topbar">
          <button class="icon-btn back-btn" id="backBtn">
            <svg class="icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="topbar-avatar-wrap" id="topbarAvatar"></div>
          <div class="topbar-info">
            <div class="topbar-name" id="topbarName">—</div>
            <div class="topbar-status" id="topbarStatus">—</div>
          </div>
          <div class="topbar-actions">
            <button class="icon-btn" title="Voice call">
              <svg class="icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6 6l1.15-1.84a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </button>
            <button class="icon-btn" title="Video call">
              <svg class="icon" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            </button>
            <button class="icon-btn" title="More options">
              <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </button>
          </div>
        </div>

        <!-- Messages area -->
        <div class="messages-area" id="messagesArea">
          <div class="date-divider"><span>Today</span></div>
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator hidden" id="typingIndicator">
          <div class="typing-bubble">
            <span></span><span></span><span></span>
          </div>
          <span class="typing-label" id="typingLabel">typing…</span>
        </div>

        <!-- Input bar -->
        <div class="input-bar">
          <button class="icon-btn emoji-btn" id="emojiBtn" title="Emoji">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
          <div class="input-wrap">
            <textarea class="msg-input" id="msgInput" placeholder="Message…" rows="1"></textarea>
          </div>
          <button class="icon-btn attach-btn" title="Attach">
            <svg class="icon" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="send-btn" id="sendBtn" title="Send">
            <svg class="icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

        <!-- Emoji picker -->
        <div class="emoji-picker hidden" id="emojiPicker"></div>

      </div>
    </main>
  </div>

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

  <script src="script.js"></script>
</body>
</html>
